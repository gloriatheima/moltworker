<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading - Moltworker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cf-orange: #f6821f;
        --cf-orange-hover: #e07315;
        --bg: #f5f4f2;
        --card: #ffffff;
        --border: #e4e4e0;
        --text: #1d1d1d;
        --muted: #6b7280;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background-color: var(--bg);
        background-image: radial-gradient(rgba(29, 29, 29, 0.08) 0.8px, transparent 0.8px);
        background-size: 14px 14px;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: var(--text);
        padding: 24px;
      }

      .container {
        width: 100%;
        max-width: 760px;
        margin: 0 auto;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 20px;
      }

      .logo {
        width: 40px;
        height: 40px;
        border-radius: 10px;
      }

      .header h1 {
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .main-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        padding: 28px;
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      .main-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.06);
      }

      .brand-logo {
        width: 180px;
        margin: 0 auto 20px;
        display: block;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.9;
          transform: scale(0.95);
        }
      }

      .spinner-container h2 {
        margin: 0;
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--cf-orange);
      }

      .status {
        font-size: 1rem;
        line-height: 1.75;
        color: var(--muted);
        margin-bottom: 18px;
      }

      .spinner-container {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        margin-bottom: 14px;
      }

      .spinner {
        width: 22px;
        height: 22px;
        border: 3px solid #f4dcc5;
        border-top-color: var(--cf-orange);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .dots {
        display: inline-block;
      }

      .dots::after {
        content: '';
        animation: dots 1.5s steps(4, end) infinite;
      }

      @keyframes dots {
        0%,
        20% {
          content: '';
        }
        40% {
          content: '.';
        }
        60% {
          content: '..';
        }
        80%,
        100% {
          content: '...';
        }
      }

      .info {
        font-size: 0.85rem;
        color: var(--muted);
        margin-top: 12px;
        border-top: 1px dashed var(--border);
        padding-top: 12px;
      }

      .error {
        color: #8a3f00;
        margin-top: 14px;
        padding: 12px 14px;
        background: #fff7ed;
        border: 1px solid #ffd5b3;
        border-radius: 10px;
        display: none;
      }

      .ready {
        color: var(--cf-orange);
      }

      @media (max-width: 640px) {
        .main-card {
          padding: 20px;
        }

        .brand-logo {
          width: 150px;
        }

        .spinner-container h2 {
          font-size: 1.3rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img src="/logo.png" alt="Moltworker" class="logo" />
        <h1>OpenClaw on Workers</h1>
      </div>

      <div class="main-card">
        <img src="/logo.png" alt="Moltworker" class="brand-logo" />

        <div class="spinner-container">
          <div class="spinner"></div>
          <h2 id="title">Waiting for OpenClaw to boot</h2>
        </div>

        <p class="status" id="status">Starting container...</p>

        <p class="error" id="error"></p>

        <p class="info">Cold starts usually take 1-2 minutes</p>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById('status');
      const titleEl = document.getElementById('title');
      const errorEl = document.getElementById('error');
      let pollCount = 0;
      let consecutiveErrors = 0;
      const maxConsecutiveErrors = 5;

      async function checkStatus() {
        pollCount++;

        try {
          const response = await fetch('/api/status');
          const data = await response.json();
          consecutiveErrors = 0;

          if (data.ok && data.status === 'running') {
            // Gateway reports ready — verify the proxy actually serves content
            // before reloading. containerFetch can hang if the gateway port is
            // open but the HTTP handler isn't fully initialized yet.
            statusEl.textContent = 'Gateway ready, verifying...';
            try {
              const probeCtrl = new AbortController();
              const probeTimer = setTimeout(() => probeCtrl.abort(), 10000);
              const probeResp = await fetch(window.location.href, {
                signal: probeCtrl.signal,
                headers: { Accept: 'text/html' },
              });
              clearTimeout(probeTimer);
              const probeText = await probeResp.text();
              if (
                probeResp.ok &&
                probeText.length > 100 &&
                !probeText.includes('Starting container')
              ) {
                // Proxy is serving real content — safe to reload
                titleEl.innerHTML = '<span class="ready">Ready!</span>';
                statusEl.textContent = 'Redirecting...';
                document.querySelector('.spinner').style.display = 'none';
                setTimeout(() => {
                  window.location.reload();
                }, 300);
                return;
              }
            } catch {
              // Probe failed — gateway not truly ready, keep polling
            }
            statusEl.textContent = 'Gateway starting up...';
            setTimeout(checkStatus, 3000);
            return;
          }

          // Update status message based on state
          if (data.status === 'not_running') {
            statusEl.textContent = 'Container is starting up...';
          } else if (data.status === 'not_responding') {
            statusEl.textContent = 'Container started, waiting for gateway...';
          } else {
            statusEl.textContent = 'Checking status... (poll #' + pollCount + ')';
          }

          // Continue polling
          setTimeout(checkStatus, 2000);
        } catch (err) {
          consecutiveErrors++;

          if (consecutiveErrors >= maxConsecutiveErrors) {
            errorEl.textContent = 'Unable to reach server. Please refresh the page.';
            errorEl.style.display = 'block';
            statusEl.textContent = 'Connection lost';
          } else {
            statusEl.textContent =
              'Retrying... (' + consecutiveErrors + '/' + maxConsecutiveErrors + ')';
            setTimeout(checkStatus, 3000);
          }
        }
      }

      // Start polling after a brief delay
      setTimeout(checkStatus, 1000);
    </script>
  </body>
</html>
